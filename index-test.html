<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lettre de Saint-Valentin</title>

<style>
/* =========================
   CORRECTION CRITIQUE MODALE
========================= */
[hidden] {
  display: none !important;
}

/* =========================
   VARIABLES
========================= */
:root {
  --red: #c62828;
  --transition: 0.6s ease;
}

/* =========================
   RESET
========================= */
*,
*::before,
*::after {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f5f5f5;
  font-family: system-ui, sans-serif;
}

/* =========================
   ENVELOPPE
========================= */
.envelope-section {
  padding: 2rem;
}

.envelope {
  position: relative;
  width: 300px;
  height: 200px;
  background: #ffffff;
  border: 2px solid #ddd;
  overflow: hidden;
}

/* =========================
   SCEAU
========================= */
.seal {
  position: absolute;
  inset: 0;
  margin: auto;
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: var(--red);
  color: #ffffff;
  font-size: 1.8rem;
  border: none;
  cursor: pointer;
  transition: transform var(--transition);
}

.seal:focus-visible {
  outline: 3px solid #000;
}

.envelope.open .seal {
  transform: scale(0);
}

/* =========================
   LETTRE
========================= */
.letter {
  position: absolute;
  bottom: -100%;
  left: 0;
  width: 100%;
  height: 100%;
  padding: 1rem;
  background: linear-gradient(
    to bottom,
    rgba(255, 255, 255, 0.95),
    rgba(198, 40, 40, 0.2)
  );
  backdrop-filter: blur(2px);
  transition: transform var(--transition);
}

.envelope.open .letter {
  transform: translateY(-100%);
}

.letter h1 {
  margin-top: 0;
  font-size: 1.2rem;
}

/* =========================
   GALERIE PHOTOS
========================= */
.photo-gallery {
  display: flex;
  gap: 0.5rem;
  margin-top: 1rem;
  flex-wrap: wrap;
}

.photo-thumb {
  border: none;
  background: none;
  padding: 0;
  width: 56px;
  height: 56px;
  cursor: pointer;
}

.photo-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 4px;
  transition: transform 0.3s ease;
}

.photo-thumb:hover img,
.photo-thumb:focus-visible img {
  transform: scale(1.05);
  outline: 2px solid var(--red);
}

/* =========================
   MODALE
========================= */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

.modal img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 6px;
}

.modal-close {
  position: absolute;
  top: 1rem;
  right: 1rem;
  background: white;
  border: none;
  font-size: 1.2rem;
  cursor: pointer;
}

/* =========================
   RESPONSIVE
========================= */
@media (min-width: 768px) {
  .envelope {
    width: 380px;
    height: 240px;
  }
}

/* =========================
   REDUCED MOTION
========================= */
@media (prefers-reduced-motion: reduce) {
  * {
    transition: none !important;
    animation: none !important;
  }
}
</style>
</head>

<body>

<main>
  <section class="envelope-section">

    <div class="envelope" aria-live="polite">

      <button
        class="seal"
        id="sealButton"
        aria-label="Ouvrir la lettre"
        aria-expanded="false">
        ❤
      </button>

      <div class="letter">
        <article>
          <h1>Lorem ipsum</h1>
          <p>
            Lorem ipsum dolor sit amet, consectetur adipiscing elit.
            Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
          </p>

          <div class="photo-gallery" aria-label="Galerie de souvenirs">
            <button class="photo-thumb">
              <img src="https://picsum.photos/200?1" alt="Souvenir 1">
            </button>
            <button class="photo-thumb">
              <img src="https://picsum.photos/200?2" alt="Souvenir 2">
            </button>
            <button class="photo-thumb">
              <img src="https://picsum.photos/200?3" alt="Souvenir 3">
            </button>
          </div>
        </article>
      </div>

    </div>

  </section>
</main>

<!-- MODALE -->
<div class="modal" hidden role="dialog" aria-modal="true">
  <button class="modal-close" aria-label="Fermer la photo">✕</button>
  <img src="" alt="" id="modalImage">
</div>

<script>
/* =========================
   OUVERTURE ENVELOPPE
========================= */
const sealButton = document.getElementById("sealButton");
const envelope = document.querySelector(".envelope");

sealButton.addEventListener("click", () => {
  const opened = envelope.classList.toggle("open");
  sealButton.setAttribute("aria-expanded", opened);
});

/* =========================
   MODALE PHOTOS
========================= */
const modal = document.querySelector(".modal");
const modalImage = document.getElementById("modalImage");
const thumbs = document.querySelectorAll(".photo-thumb img");
const closeBtn = document.querySelector(".modal-close");

thumbs.forEach(img => {
  img.parentElement.addEventListener("click", () => {
    modalImage.src = img.src;
    modalImage.alt = img.alt;
    modal.hidden = false;
    document.body.style.overflow = "hidden";
    closeBtn.focus();
  });
});

closeBtn.addEventListener("click", closeModal);

document.addEventListener("keydown", e => {
  if (e.key === "Escape" && !modal.hidden) {
    closeModal();
  }
});

function closeModal() {
  modal.hidden = true;
  document.body.style.overflow = "";
}
</script>

</body>
</html>
